<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enggano Island Coral Reef Dashboard (Verified)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Slab:wght@600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* slate-50 */
        }
        h1, h2, h3, .font-heading {
            font-family: 'Roboto Slab', serif;
        }
        
        /* Active states for filter and sort buttons */
        #filter-container button.active, #sort-container button.active {
            background-color: #3b82f6; /* blue-500 */
            color: white;
            border-color: #3b82f6;
        }
        #sort-container button.active i {
            color: white;
        }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header Section -->
    <header class="bg-white shadow-sm border-b border-slate-200 py-8 mb-8">
        <div class="container mx-auto px-4 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                    <div class="flex items-center gap-3 mb-2">
                        <i class="fa-solid fa-water text-blue-500 text-3xl"></i>
                        <h1 class="text-3xl md:text-4xl font-heading text-slate-800">Enggano Reef Analysis</h1>
                    </div>
                    <p class="text-slate-500 text-lg">Verified Trends against 2011-2024 Source Data</p>
                </div>
                
                <!-- Overall Summary Banner -->
                <div class="bg-slate-800 text-white p-4 rounded-xl shadow-lg flex gap-6 items-center">
                    <div>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Overall Mean Coral</p>
                        <p id="overall-mean" class="text-xl font-bold">--</p>
                    </div>
                    <div class="w-px h-10 bg-slate-600"></div>
                    <div>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Net Annual Trend</p>
                        <p id="overall-trend" class="text-xl font-bold">--</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 lg:px-8 pb-16">
        
        <!-- Controls -->
        <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-8 gap-6 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
            
            <div class="w-full xl:w-auto">
                <p class="text-xs text-slate-400 font-bold uppercase tracking-wider mb-2"><i class="fa-solid fa-filter mr-1"></i> Filter by Region</p>
                <div id="filter-container" class="flex flex-wrap gap-2">
                    <button class="active px-5 py-2 rounded-lg bg-slate-50 border border-slate-200 text-slate-600 hover:bg-slate-100 transition-colors font-medium text-sm" data-filter="All">All Regions</button>
                    <button class="px-5 py-2 rounded-lg bg-slate-50 border border-slate-200 text-slate-600 hover:bg-slate-100 transition-colors font-medium text-sm" data-filter="Utara">Utara</button>
                    <button class="px-5 py-2 rounded-lg bg-slate-50 border border-slate-200 text-slate-600 hover:bg-slate-100 transition-colors font-medium text-sm" data-filter="Selatan">Selatan</button>
                    <button class="px-5 py-2 rounded-lg bg-slate-50 border border-slate-200 text-slate-600 hover:bg-slate-100 transition-colors font-medium text-sm" data-filter="Timur">Timur</button>
                    <button class="px-5 py-2 rounded-lg bg-slate-50 border border-slate-200 text-slate-600 hover:bg-slate-100 transition-colors font-medium text-sm" data-filter="Barat">Barat</button>
                </div>
            </div>
            
            <div class="w-full xl:w-auto">
                <p class="text-xs text-slate-400 font-bold uppercase tracking-wider mb-2"><i class="fa-solid fa-sort mr-1"></i> Sort by Trend</p>
                <div id="sort-container" class="flex flex-wrap gap-2">
                    <button class="px-5 py-2 rounded-lg bg-slate-50 border border-slate-200 text-slate-600 hover:bg-slate-100 transition-colors font-medium text-sm" data-sort="best">
                        <i class="fa-solid fa-arrow-trend-up text-emerald-500 mr-2"></i>Best Trend
                    </button>
                    <button class="active px-5 py-2 rounded-lg bg-slate-50 border border-slate-200 text-slate-600 hover:bg-slate-100 transition-colors font-medium text-sm" data-sort="worst">
                        <i class="fa-solid fa-arrow-trend-down text-rose-500 mr-2"></i>Worst Trend
                    </button>
                </div>
            </div>

        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="text-center py-20">
            <i class="fa-solid fa-circle-notch fa-spin text-5xl text-blue-500 mb-4"></i>
            <h3 class="text-xl font-heading text-slate-700">Verifying Source Data...</h3>
            <p class="mt-2 text-slate-500">Calculating trends from all_data.csv and stats_summary.csv</p>
        </div>

        <!-- Grid Container -->
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" style="display: none;">
            <!-- Dynamic Cards Will Be Injected Here -->
        </div>

    </main>

    <script>
        let reefData = [];
        let currentFilter = 'All';
        let currentSort = 'worst'; // Default to showing worst declines first

        // --- Data Loading & Verification ---
        async function initData() {
            try {
                // Fetch both CSV files concurrently
                const [allDataRes, statsRes] = await Promise.all([
                    fetch('./data/all_data.csv'),
                    fetch('./data/stats_summary.csv')
                ]);
                
                if (!allDataRes.ok || !statsRes.ok) throw new Error("Could not fetch CSV files.");

                const allCsv = await allDataRes.text();
                const statsCsv = await statsRes.text();
                
                const allData = Papa.parse(allCsv, { header: true, dynamicTyping: true, skipEmptyLines: true }).data;
                const statsData = Papa.parse(statsCsv, { header: true, dynamicTyping: true, skipEmptyLines: true }).data;
                
                verifyAndBuildData(allData, statsData);

            } catch(e) {
                console.error("Data loading failed", e);
                const loadingEl = document.getElementById('loading');
                loadingEl.innerHTML = `
                    <div class="bg-rose-50 text-rose-600 p-6 rounded-xl border border-rose-200 inline-block">
                        <i class="fa-solid fa-triangle-exclamation text-4xl mb-3"></i>
                        <h3 class="text-xl font-bold">Failed to Load Verified Data</h3>
                        <p class="mt-2 text-sm">Please ensure the dashboard is running on a server and <code>/data/all_data.csv</code> and <code>/data/stats_summary.csv</code> exist.</p>
                    </div>`;
            }
        }

        function verifyAndBuildData(allData, statsData) {
            // Update Overall Summary Header
            const engganoStat = statsData.find(d => d.Region === 'Enggano');
            const enggano2011 = allData.find(d => d.Region === 'Enggano' && d.Year === 2011);
            const enggano2024 = allData.find(d => d.Region === 'Enggano' && d.Year === 2024);
            
            if (engganoStat && enggano2011 && enggano2024) {
                document.getElementById('overall-mean').innerText = engganoStat.Mean_Coral_Area_km2.toFixed(2) + ' km²';
                
                // Calculate Trend (2024 minus 2011 divided by 13 years)
                const trend = (enggano2024['Coral Area (km²)'] - enggano2011['Coral Area (km²)']) / 13;
                
                const trendEl = document.getElementById('overall-trend');
                trendEl.innerText = (trend > 0 ? '+' : '') + trend.toFixed(3) + ' km²/yr';
                trendEl.className = trend > 0 ? 'text-emerald-400 font-bold text-xl' : 'text-rose-400 font-bold text-xl';
            }

            // Build Regional Array
            reefData = statsData.filter(d => d.Region !== 'Enggano').map(stat => {
                
                // Find start and end points to verify trend
                const data2011 = allData.find(d => d.Region === stat.Region && d.Year === 2011);
                const data2024 = allData.find(d => d.Region === stat.Region && d.Year === 2024);
                
                const area2011 = data2011 ? data2011['Coral Area (km²)'] : 0;
                const area2024 = data2024 ? data2024['Coral Area (km²)'] : 0;
                
                // Annualized change
                const avgAnnualTrend = (area2024 - area2011) / 13; 
                
                // Categorize Region correctly
                let broadRegion = 'Other';
                if (stat.Region.includes('Utara')) broadRegion = 'Utara';
                else if (stat.Region.includes('Selatan')) broadRegion = 'Selatan';
                else if (stat.Region.includes('Timur')) broadRegion = 'Timur';
                else if (stat.Region.includes('Barat')) broadRegion = 'Barat';

                return {
                    name: stat.Region,
                    region: broadRegion,
                    meanCoral: stat.Mean_Coral_Area_km2,
                    meanRubble: stat.Mean_Rubble_Area_km2,
                    avgAnnualTrend: avgAnnualTrend
                };
            });
            
            // Hide loading, show grid, render
            document.getElementById('loading').style.display = 'none';
            document.getElementById('grid').style.display = 'grid';
            renderCards();
        }

        // --- UI Rendering ---
        function createCard(data) {
            const isPositive = data.avgAnnualTrend > 0;
            const trendColor = isPositive ? 'text-emerald-600' : 'text-rose-600';
            const trendBg = isPositive ? 'bg-emerald-50' : 'bg-rose-50';
            const trendIcon = isPositive ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down';
            const borderColor = isPositive ? 'border-emerald-500' : 'border-rose-500';
            const trendSign = isPositive ? '+' : '';

            return `
            <div class="bg-white rounded-xl shadow p-6 border-t-4 ${borderColor} hover:shadow-xl transition-all duration-300 flex flex-col h-full transform hover:-translate-y-1">
                <div class="flex justify-between items-start mb-5">
                    <h3 class="text-lg font-heading text-slate-800 leading-tight pr-2">${data.name}</h3>
                    <span class="px-3 py-1 text-[10px] font-bold uppercase tracking-wider rounded-full bg-slate-100 text-slate-600 whitespace-nowrap">${data.region}</span>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mb-6 mt-auto">
                    <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Mean Coral</p>
                        <p class="text-base font-bold text-slate-700">${data.meanCoral.toFixed(3)} <span class="text-xs font-normal text-slate-400">km²</span></p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Mean Rubble</p>
                        <p class="text-base font-bold text-slate-700">${data.meanRubble.toFixed(3)} <span class="text-xs font-normal text-slate-400">km²</span></p>
                    </div>
                </div>
                
                <div class="border-t border-slate-100 pt-4 mt-auto">
                    <div class="flex justify-between items-center ${trendBg} p-3 rounded-lg">
                        <div>
                            <p class="text-[10px] ${trendColor} opacity-80 font-bold uppercase tracking-wider mb-1">Avg Annual Trend</p>
                            <div class="flex items-baseline">
                                <span class="text-2xl font-bold ${trendColor}">${trendSign}${data.avgAnnualTrend.toFixed(4)}</span>
                                <span class="ml-1 text-xs ${trendColor} opacity-70 font-medium">km²/yr</span>
                            </div>
                        </div>
                        <div class="h-10 w-10 rounded-full bg-white flex items-center justify-center shadow-sm">
                            <i class="fa-solid ${trendIcon} ${trendColor} text-lg"></i>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        function renderCards() {
            const grid = document.getElementById('grid');
            grid.innerHTML = ''; // Clear existing
            
            let dataToRender = [...reefData];

            // Apply Filters
            if (currentFilter !== 'All') {
                dataToRender = dataToRender.filter(d => d.region === currentFilter);
            }
            
            // Apply Sorts
            if (currentSort === 'best') {
                dataToRender.sort((a, b) => b.avgAnnualTrend - a.avgAnnualTrend);
            } else if (currentSort === 'worst') {
                dataToRender.sort((a, b) => a.avgAnnualTrend - b.avgAnnualTrend);
            }
            
            // Render HTML
            if(dataToRender.length === 0) {
                 grid.innerHTML = `<p class="col-span-full text-center text-slate-500 py-10">No data found for this selection.</p>`;
                 return;
            }

            dataToRender.forEach(data => {
                grid.innerHTML += createCard(data);
            });
        }

        // --- Event Listeners ---
        document.getElementById('filter-container').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (btn) {
                currentFilter = btn.dataset.filter;
                document.querySelectorAll('#filter-container button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCards();
            }
        });
        
        document.getElementById('sort-container').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (btn) {
                currentSort = btn.dataset.sort;
                document.querySelectorAll('#sort-container button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCards();
            }
        });

        // Initialize App
        document.addEventListener('DOMContentLoaded', initData);

    </script>
</body>
</html>
